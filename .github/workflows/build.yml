name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: write   # required for creating releases + uploading assets
  actions: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ─────────────────────────────────────────────────────────────────
  # Linux .deb + .AppImage (no signing needed for sideload)
  # ─────────────────────────────────────────────────────────────────
  linux:
    name: Linux desktop
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: System deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            build-essential pkg-config libssl-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev \
            libwebkit2gtk-4.1-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev \
            libasound2-dev libpulse-dev cmake

      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: cargo-linux-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: cargo-linux-

      - run: npm ci
      - run: npm run tauri -- build --ci

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: zero-linux
          path: |
            src-tauri/target/release/zero
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage

  # ─────────────────────────────────────────────────────────────────
  # Windows .exe + .msi + .nsis (unsigned — for sideload / testing)
  # ─────────────────────────────────────────────────────────────────
  windows:
    name: Windows desktop
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ilammy/msvc-dev-cmd@v1
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - uses: dtolnay/rust-toolchain@stable
        with: { targets: x86_64-pc-windows-msvc }
      - uses: swatinem/rust-cache@v2
        with: { workspaces: src-tauri -> target }
      - shell: pwsh
        run: |
          $env:PATH = "$env:PATH;$env:CARGO_HOME\bin"
          npm ci
          npm run tauri -- build --ci
      - uses: actions/upload-artifact@v4
        with:
          name: zero-windows
          path: |
            src-tauri/target/release/zero.exe
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe

  # ─────────────────────────────────────────────────────────────────
  # Android universal APK (4 ABIs) + AAB for Play Store
  # ─────────────────────────────────────────────────────────────────
  android:
    name: Android (APK + AAB)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android

      - name: Setup JDK 17 (sdkmanager needs ≥17)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: ndk
        with:
          ndk-version: r26d
          add-to-path: true

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0'

      - name: Cache cargo + gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
            ~/.gradle/caches
          key: cargo-android-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: cargo-android-

      - run: npm ci
      - name: Tauri Android build (unsigned)
        run: npm run tauri -- android build --ci
        env:
          ANDROID_HOME: ${{ steps.ndk.android-sdk-path }}/..
          ANDROID_SDK_ROOT: ${{ steps.ndk.android-sdk-path }}/..
          ANDROID_NDK_HOME: ${{ steps.ndk.ndk-path }}

      - name: Sign APK (debug keystore for sideload, or upload keystore from secrets)
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS:    ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          set -e
          APK=src-tauri/gen/android/app/build/outputs/apk/universal/release/app-universal-release-unsigned.apk
          AAB=src-tauri/gen/android/app/build/outputs/bundle/universalRelease/app-universal-release.aab
          BUILD_TOOLS=$ANDROID_HOME/build-tools/34.0.0

          if [ -n "$KEYSTORE_B64" ] && [ -n "$KEYSTORE_PASS" ]; then
            echo "::notice::Signing with upload keystore"
            echo "$KEYSTORE_B64" | base64 -d > /tmp/upload.jks
            ALIAS="${KEY_ALIAS:-upload}"
            "$BUILD_TOOLS/zipalign" -f 4 "$APK" "${APK%.apk}-aligned.apk"
            "$BUILD_TOOLS/apksigner" sign \
              --ks /tmp/upload.jks --ks-pass "pass:$KEYSTORE_PASS" \
              --ks-key-alias "$ALIAS" --key-pass "pass:$KEYSTORE_PASS" \
              --out "${APK/unsigned/signed}" "${APK%.apk}-aligned.apk"
            "$BUILD_TOOLS/apksigner" verify "${APK/unsigned/signed}"
          else
            echo "::notice::No keystore secret — generating debug keystore for sideload"
            KEYTOOL_PASSWORD=android
            if [ ! -f ~/.android/debug.keystore ]; then
              mkdir -p ~/.android
              keytool -genkey -v -keystore ~/.android/debug.keystore -alias androiddebugkey \
                -keyalg RSA -keysize 2048 -validity 10000 \
                -dname "CN=Zero Debug,O=Zero,C=US" \
                -storepass $KEYTOOL_PASSWORD -keypass $KEYTOOL_PASSWORD
            fi
            "$BUILD_TOOLS/zipalign" -f 4 "$APK" "${APK%.apk}-aligned.apk"
            "$BUILD_TOOLS/apksigner" sign \
              --ks ~/.android/debug.keystore --ks-pass "pass:$KEYTOOL_PASSWORD" \
              --ks-key-alias androiddebugkey --key-pass "pass:$KEYTOOL_PASSWORD" \
              --out "${APK/unsigned/signed}" "${APK%.apk}-aligned.apk"
            "$BUILD_TOOLS/apksigner" verify "${APK/unsigned/signed}"
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: zero-android-apk
          path: src-tauri/gen/android/app/build/outputs/apk/universal/release/app-universal-release-*.apk
          if-no-files-found: error

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: zero-android-aab
          path: src-tauri/gen/android/app/build/outputs/bundle/universalRelease/app-universal-release.aab
          if-no-files-found: warn

  # ─────────────────────────────────────────────────────────────────
  # Source archive (clean — no node_modules / target / gen)
  # ─────────────────────────────────────────────────────────────────
  source:
    name: Source tarball
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Create source tarball
        run: |
          tar --exclude='node_modules' \
              --exclude='src-tauri/target' \
              --exclude='src-tauri/gen' \
              --exclude='.git' \
              --exclude='*.apk' --exclude='*.aab' --exclude='*.msi' --exclude='*.exe' \
              --exclude='*.deb' --exclude='*.AppImage' --exclude='*.dmg' \
              -czf zero-${{ github.ref_name }}-source.tar.gz .
          ls -lh zero-*-source.tar.gz
      - uses: actions/upload-artifact@v4
        with:
          name: zero-source
          path: zero-*-source.tar.gz

  # ─────────────────────────────────────────────────────────────────
  # Release — on tag push, bundle ALL artifacts into GitHub Release
  # ─────────────────────────────────────────────────────────────────
  release:
    name: 📦 Publish release
    needs: [linux, windows, android, source]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with: { path: dist }

      - name: List artifacts
        run: find dist -type f -printf '%P  (%s bytes)\n' | sort

      - name: Compute SHA256
        id: sha
        run: |
          (cd dist && find . -type f -exec sha256sum {} \;) | sort > dist/SHA256SUMS.txt
          cat dist/SHA256SUMS.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Zero ${{ github.ref_name }}
          body: |
            ## Zero — voice AI assistant
            Cross-platform Tauri 2.0 build (Linux + Windows + Android).
            - **Linux**: `.deb` + `.AppImage`
            - **Windows**: `.msi` + `.exe` (NSIS installer)
            - **Android**: universal APK (4 ABIs) + AAB (Play Store)
            - **Source**: clean tarball
            See `SHA256SUMS.txt` attached below for checksums.
          fail_on_unmatched_files: true
          generate_release_notes: true
          files: |
            dist/**/*.deb
            dist/**/*.AppImage
            dist/**/*.msi
            dist/**/*.exe
            dist/**/*.apk
            dist/**/*.aab
            dist/**/*.tar.gz
            dist/SHA256SUMS.txt
