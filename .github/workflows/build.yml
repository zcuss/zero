name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────────────────────────
  # Windows .exe (MSI + NSIS installer) + Linux .deb/.AppImage
  # ─────────────────────────────────────────────────────────────────
  desktop:
    name: ${{ matrix.platform }} desktop
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest, ubuntu-22.04]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            build-essential pkg-config libssl-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev \
            libwebkit2gtk-4.1-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev \
            libasound2-dev libpulse-dev cmake

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'windows-latest' && 'x86_64-pc-windows-msvc' || '' }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: cargo-${{ runner.os }}-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-

      - run: npm ci
      - run: npm run tauri -- build --ci

      - name: Upload Linux artifacts
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: zero-linux
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage

      - name: Upload Windows artifacts
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: zero-windows
          path: |
            src-tauri/target/release/zero.exe
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe

  # ─────────────────────────────────────────────────────────────────
  # Android APK (universal) + AAB (Play Store)
  # ─────────────────────────────────────────────────────────────────
  android:
    name: Android (universal APK)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android

      - uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26d
          add-to-path: true

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools,platforms;android-34,build-tools;34.0.0'

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
            ~/.gradle/caches
          key: cargo-android-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: cargo-android-

      - run: npm ci
      - name: Run Tauri Android build
        run: npm run tauri -- android build --ci

      - name: Sign APK
        if: env.ANDROID_KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: |
          set -e
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 -d > /tmp/keystore.jks
            APK=src-tauri/gen/android/app/build/outputs/apk/universal/release/app-universal-release-unsigned.apk
            AAPT=$ANDROID_HOME/build-tools/34.0.0
            "$AAPT/zipalign" -f 4 "$APK" "${APK%.apk}-aligned.apk"
            "$AAPT/apksigner" sign \
              --ks /tmp/keystore.jks --ks-pass "pass:$KEYSTORE_PASS" \
              --ks-key-alias upload --key-pass "pass:$KEYSTORE_PASS" \
              --out "${APK/unsigned/signed}" "${APK%.apk}-aligned.apk"
            "$AAPT/apksigner" verify "${APK/unsigned/signed}"
          else
            echo "::warning::No keystore secret — uploading unsigned APK"
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: zero-android-apk
          path: |
            src-tauri/gen/android/app/build/outputs/apk/universal/release/app-universal-release-*.apk
          if-no-files-found: warn

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: zero-android-aab
          path: src-tauri/gen/android/app/build/outputs/bundle/universalRelease/app-universal-release.aab
          if-no-files-found: warn

  # ─────────────────────────────────────────────────────────────────
  # Release job — bundle everything into a GitHub release on tag
  # ─────────────────────────────────────────────────────────────────
  release:
    name: Publish release
    needs: [desktop, android]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Show artifacts
        run: ls -laR artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.exe
            artifacts/**/*.msi
            artifacts/**/*.deb
            artifacts/**/*.AppImage
            artifacts/**/*.apk
            artifacts/**/*.aab
          generate_release_notes: true
